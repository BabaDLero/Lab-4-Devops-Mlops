name: CI/CD

on:
  pull_request:
    branches: [dev]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci-dev:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Backend checks
      - name: Backend - npm ci
        working-directory: backend
        run: npm ci

      - name: Backend - lint (if configured)
        working-directory: backend
        run: |
          npm run lint || echo "No backend lint script configured"

      - name: Backend - npm audit
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Backend - tests
        working-directory: backend
        run: npm test -- --runInBand

      - name: Backend - Snyk scan (requires SNYK_TOKEN)
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high

      - name: Backend - Snyk scan skipped (no SNYK_TOKEN)
        if: ${{ secrets.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN non défini => scan Snyk ignoré"

      # Frontend checks
      - name: Frontend - npm ci
        working-directory: frontend
        run: npm ci

      - name: Frontend - lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend - npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Frontend - Snyk scan (requires SNYK_TOKEN)
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high

      - name: Frontend - Snyk scan skipped (no SNYK_TOKEN)
        if: ${{ secrets.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN non défini => scan Snyk ignoré"

      - name: Frontend - tests
        working-directory: frontend
        run: npm test -- --watchAll=false


      # Build Docker images (no push)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker build -t ci-backend:pr -f backend/Dockerfile backend
          docker build -t ci-frontend:pr -f frontend/Dockerfile frontend

  cd-main:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Create .env files from GitHub Secrets so they can be copied into images
      - name: Create backend .env
        working-directory: backend
        run: |
          echo "APP_SECRET_NAME=${{ secrets.APP_SECRET_NAME }}" > .env

      - name: Create frontend .env (optional)
        working-directory: frontend
        run: |
          echo "REACT_APP_DUMMY=1" > .env

      - name: Build production images
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-testing-deploy:backend -f backend/Dockerfile backend
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-testing-deploy:frontend -f frontend/Dockerfile frontend

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-testing-deploy:backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-testing-deploy:frontend

